name: Verse of the Day

on:
  schedule:
    - cron: "0 10 * * *"  # 6 AM EST (10 AM UTC)
  workflow_dispatch:       # allow manual runs

jobs:
  post-verse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Pick and post verse of the day
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python verse_of_the_day.py

      - name: Commit votd.json
        run: |
          git diff --quiet data/votd.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/votd.json
          git commit -m "chore: update verse of the day"
          git push
