name: Daily Quiz

on:
  schedule:
    - cron: "5 10 * * *"  # 6:05 AM EST (5 min after VOTD)
  workflow_dispatch:       # allow manual runs

jobs:
  post-quiz:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Pick and post daily quiz
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          QUIZ_CHANNEL_ID: ${{ secrets.QUIZ_CHANNEL_ID }}
        run: python daily_quiz.py

      - name: Commit quiz data and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_quiz.json data/quiz_history.json data/quiz_leaderboard.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update daily quiz"
          git push
